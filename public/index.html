<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Competitor Intelligence — Leviathan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #121212;
  --border: #2c2c2c;
  --border2: #2c2c2c;
  --text: #ffffff;
  --muted: #a7a7a5;
  --accent: #F92E07;
  --accent-dim: rgba(249, 46, 7, 0.1);
  --accent-glow: rgba(249, 46, 7, 0.15);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "neue-haas-grotesk-text", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  position: relative;
}

body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.04;
  mix-blend-mode: overlay;
  background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
}

.header {
  border-bottom: 1px solid var(--border);
  padding: 18px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(13, 13, 13, 0.8);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 18px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text);
}
.logo span { color: var(--accent); }
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-tag {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  color: var(--accent);
  border: 1px solid rgba(249, 46, 7, 0.3);
  padding: 4px 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  border-radius: 4px;
}
.powered-tag {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
  font-family: 'Space Mono', monospace;
}

.main { max-width: 900px; margin: 0 auto; padding: 80px 40px 100px; position: relative; z-index: 10; }

.hero-label {
  font-size: 11px;
  color: var(--accent);
  letter-spacing: .18em;
  text-transform: uppercase;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Space Mono', monospace;
}
.hero-label::before { content: ''; width: 20px; height: 1px; background: var(--accent); }

.hero-title {
  font-family: 'Syne', sans-serif;
  font-size: 64px;
  font-weight: 800;
  letter-spacing: -.04em;
  line-height: .95;
  text-transform: uppercase;
  margin-bottom: 28px;
  color: var(--text);
}
.hero-title .red { color: var(--accent); }

.hero-sub {
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 56px;
  max-width: 500px;
  line-height: 1.65;
  font-weight: 400;
}

.input-wrap {
  display: flex;
  border: 1px solid var(--border);
  background: var(--surface);
  margin-bottom: 16px;
  border-radius: 200px;
  padding: 6px;
  transition: border-color .2s, box-shadow .2s;
}
.input-wrap:focus-within { 
  border-color: var(--accent); 
  box-shadow: 0 0 0 4px var(--accent-glow);
}

.domain-input {
  flex: 1;
  height: 54px;
  background: transparent;
  border: none;
  padding: 0 24px;
  font-size: 16px;
  font-family: 'Space Mono', monospace;
  color: var(--text);
  outline: none;
  letter-spacing: .02em;
}
.domain-input::placeholder { color: var(--muted); }

.btn-primary {
  height: 54px;
  padding: 0 36px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 200px;
  font-size: 12px;
  font-weight: 800;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  letter-spacing: .12em;
  text-transform: uppercase;
  transition: background .15s, transform .1s;
  white-space: nowrap;
}
.btn-primary:hover { background: #d62505; }
.btn-primary:active { transform: scale(.98); }
.btn-primary:disabled { opacity: .3; cursor: not-allowed; }

.hint { font-size: 11px; color: var(--muted); display: flex; gap: 20px; flex-wrap: wrap; letter-spacing: .04em; }
.hint span { cursor: pointer; transition: color .15s; }
.hint span:hover { color: var(--accent); }
.hint span::before { content: '→ '; color: var(--accent); }

.loading-domain-label {
  font-size: 11px;
  color: var(--accent);
  letter-spacing: .18em;
  text-transform: uppercase;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Space Mono', monospace;
}
.loading-domain-label::before { content: ''; width: 20px; height: 1px; background: var(--accent); }

.loading-steps {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  overflow: hidden;
}
.l-step {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  transition: background .2s;
}
.l-step:last-child { border-bottom: none; }
.l-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--surface2);
  flex-shrink: 0;
  transition: background .3s;
}
.l-dot.done { background: var(--accent); }
.l-dot.active { background: var(--accent); animation: blink 1s infinite; }
.l-label { flex: 1; color: var(--muted); transition: color .2s; }
.l-label.done, .l-label.active { color: var(--text); }
.l-status { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
.l-status.done { color: var(--accent); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.confirm-title {
  font-family: 'Syne', sans-serif;
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -.04em;
  text-transform: uppercase;
  margin-bottom: 8px;
  line-height: 1;
}
.confirm-sub { font-size: 15px; color: var(--muted); margin-bottom: 28px; font-weight: 400; }

.profile-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: border-color .2s;
}
.profile-card.confirmed { border-color: rgba(249, 46, 7, 0.4); border-left: 4px solid var(--accent); }
.profile-card.excluded { opacity: .3; }

.profile-icon {
  width: 40px; height: 40px;
  background: var(--surface2);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
}
.profile-info { flex: 1; min-width: 0; }
.profile-platform {
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 6px;
  letter-spacing: .1em;
  text-transform: uppercase;
  font-family: 'Space Mono', monospace;
}
.profile-name { font-size: 15px; font-weight: 600; color: var(--text); }
.profile-url { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;}

.confidence-badge {
  font-size: 9px;
  padding: 3px 8px;
  margin-left: 8px;
  letter-spacing: .08em;
  border-radius: 4px;
  text-transform: uppercase;
  font-family: 'Space Mono', monospace;
}
.conf-high { background: var(--accent-dim); color: var(--accent); }
.conf-low { background: var(--surface2); color: var(--muted); }

.profile-actions { display: flex; gap: 6px; flex-shrink: 0; }
.btn-toggle {
  height: 34px;
  padding: 0 16px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  border-radius: 200px;
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  cursor: pointer;
  letter-spacing: .08em;
  text-transform: uppercase;
  transition: all .15s;
}
.btn-toggle:hover { border-color: var(--text); color: var(--text); }
.btn-toggle.active-confirm { background: var(--text); border-color: var(--text); color: var(--bg); }
.btn-toggle.active-exclude { background: var(--accent); border-color: var(--accent); color: #fff; }

.confirm-note {
  font-size: 13px;
  color: var(--muted);
  background: var(--surface);
  border-radius: 8px;
  border-left: 4px solid var(--accent);
  padding: 16px 20px;
  margin: 20px 0 32px;
  line-height: 1.6;
  font-weight: 400;
}
.confirm-note strong { color: var(--text); }

.btn-launch {
  height: 54px;
  padding: 0 44px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 200px;
  font-size: 12px;
  font-weight: 800;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  letter-spacing: .12em;
  text-transform: uppercase;
  transition: background .15s;
}
.btn-launch:hover { background: #d62505; }

.results-label {
  font-size: 11px;
  color: var(--accent);
  letter-spacing: .18em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Space Mono', monospace;
}
.results-label::before { content: ''; width: 20px; height: 1px; background: var(--accent); }

.results-title {
  font-family: 'Syne', sans-serif;
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -.04em;
  text-transform: uppercase;
  line-height: 1;
  margin-bottom: 28px;
}

.live-badge {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid rgba(249, 46, 7, 0.25);
  border-radius: 4px;
  padding: 5px 12px;
  letter-spacing: .1em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 2s infinite; }

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 1px;
  background: var(--border);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  margin-bottom: 32px;
}
.stat-card {
  background: var(--surface);
  padding: 24px 20px;
}
.stat-label {
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
  font-family: 'Space Mono', monospace;
}
.stat-value {
  font-family: 'Syne', sans-serif;
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -.04em;
  line-height: 1;
}
.stat-value.red { color: var(--accent); }
.stat-null { font-size: 24px; color: var(--muted); }

.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.tab-btn {
  height: 48px;
  padding: 0 24px;
  border: none;
  border-bottom: 2px solid transparent;
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  cursor: pointer;
  letter-spacing: .1em;
  text-transform: uppercase;
  transition: all .15s;
  margin-bottom: -1px;
}
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
.tab-btn:hover { color: var(--text); }

.panel { display: none; }
.panel.active { display: block; }

.ads-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 1px; }
.ad-card { background: var(--surface); overflow: hidden; }
.ad-creative { height: 80px; background: var(--surface2); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); }
.ad-body { padding: 18px 20px; }
.ad-platform { font-size: 10px; color: var(--muted); margin-bottom: 8px; letter-spacing: .1em; text-transform: uppercase; font-family: 'Space Mono', monospace; }
.ad-headline { font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.3; color: var(--text); }
.ad-copy { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; font-weight: 400; }
.ad-footer { display: flex; align-items: center; justify-content: space-between; }
.ad-live { font-size: 10px; color: var(--accent); letter-spacing: .1em; text-transform: uppercase; font-family: 'Space Mono', monospace; }
.ad-days { font-size: 11px; color: var(--muted); }
.ad-link { font-size: 10px; color: var(--text); text-decoration: none; letter-spacing: .06em; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 2px;}
.ad-link:hover { color: var(--accent); border-color: var(--accent); }

.gate-wrap { position: relative; margin-top: 16px; }
.gate-blur { filter: blur(6px); opacity: .2; pointer-events: none; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden;}
.gate-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px;
  background: linear-gradient(to bottom, transparent 0%, var(--bg) 60%);
}
.gate-title {
  font-family: 'Syne', sans-serif;
  font-size: 24px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: -.02em;
  margin-bottom: 8px;
}
.gate-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; text-align: center; font-weight: 400; }
.gate-row { 
  display: flex; gap: 0; width: 100%; max-width: 460px; 
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 200px; padding: 6px;
}
.gate-email {
  flex: 1; height: 48px;
  background: transparent; border: none;
  padding: 0 20px; font-size: 14px;
  font-family: 'Space Mono', monospace;
  color: var(--text); outline: none;
}
.gate-email::placeholder { color: var(--muted); }
.gate-submit {
  height: 48px; padding: 0 28px;
  background: var(--accent); color: #fff; border: none; border-radius: 200px;
  font-size: 11px; font-weight: 800;
  font-family: 'Syne', sans-serif;
  cursor: pointer; letter-spacing: .1em; text-transform: uppercase;
  transition: background .15s;
  white-space: nowrap;
}
.gate-submit:hover { background: #d62505; }
.gate-success { font-size: 12px; color: var(--accent); margin-top: 16px; letter-spacing: .06em; text-transform: uppercase; font-family: 'Space Mono', monospace; }

.channels-card, .kw-section, .tech-card { 
  border: 1px solid var(--border); 
  background: var(--surface); 
  border-radius: 8px;
  overflow: hidden;
}
.ch-section-title, .kw-title { 
  font-size: 11px; color: var(--muted); letter-spacing: .12em; 
  text-transform: uppercase; padding: 18px 24px 16px; 
  border-bottom: 1px solid var(--border); font-family: 'Space Mono', monospace; 
}
.ch-row, .kw-row { 
  display: flex; align-items: center; gap: 16px; 
  padding: 16px 24px; border-bottom: 1px solid var(--border); 
}
.ch-row:last-child, .kw-row:last-child { border-bottom: none; }
.ch-name { font-size: 14px; width: 140px; flex-shrink: 0; font-weight: 500;}
.ch-bar-bg { flex: 1; height: 3px; background: var(--surface2); overflow: hidden; border-radius: 10px; }
.ch-bar { height: 3px; border-radius: 10px; }
.ch-pct { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); width: 40px; text-align: right; }

.kw-section { margin-top: 16px; }
.kw-row { font-size: 14px; }
.kw-word { flex: 1; font-weight: 500;}
.kw-vol { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); }
.kw-cpc { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); }

.ch-note {
  border: 1px solid var(--border);
  border-radius: 8px;
  border-left: 4px solid var(--accent);
  background: var(--surface);
  padding: 16px 20px;
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
  margin-top: 16px;
  font-weight: 400;
}

.tech-section { padding: 20px 24px; border-bottom: 1px solid var(--border); }
.tech-section:last-child { border-bottom: none; }
.tech-section-label { font-size: 11px; color: var(--muted); margin-bottom: 14px; letter-spacing: .12em; text-transform: uppercase; font-family: 'Space Mono', monospace; }
.tech-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.tech-tag { font-size: 12px; padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border); color: var(--muted); letter-spacing: .04em; background: var(--surface2); }
.tech-tag.marketing { border-color: rgba(249, 46, 7, 0.3); color: var(--accent); background: var(--accent-dim); }
.tech-tag.ads { border-color: rgba(255,255,255,.15); color: var(--text); }
.tech-tag.analytics { border-color: rgba(255,255,255,.1); color: var(--muted); }
.tech-tag.platform { border-color: rgba(249, 46, 7, 0.25); color: var(--accent); background: var(--accent-dim); font-weight: 600; }

.empty-state { text-align: center; padding: 56px 20px; color: var(--muted); font-size: 14px; font-weight: 400; border: 1px solid var(--border); border-radius: 8px; }
.error-note { background: var(--accent-dim); border-radius: 8px; border-left: 4px solid var(--accent); padding: 16px 20px; font-size: 13px; color: var(--accent); margin-bottom: 16px; }
.warning-note { background: var(--surface); border-radius: 8px; border-left: 4px solid var(--muted); padding: 16px 20px; font-size: 13px; color: var(--muted); margin-bottom: 16px; }

.back-btn {
  background: transparent;
  border: 1px solid var(--border);
  padding: 10px 20px;
  border-radius: 200px;
  color: var(--muted);
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  cursor: pointer;
  margin-bottom: 36px;
  transition: all .15s;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.back-btn:hover { border-color: var(--text); color: var(--text); }

@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.fade-up { animation: fadeUp .4s ease both; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">LEVIATHAN<span>.</span></div>
  <div class="header-right">
    <div class="powered-tag">[Powered by AI. Guided by Humans.]</div>
    <div class="header-tag">Beta</div>
  </div>
</div>

<div class="main">
  <div id="app"></div>
</div>

<script>
const API_BASE = '/api';

let state = {
  step: 'input',
  domain: '',
  brandName: '',
  profiles: [],
  results: null,
  error: null,
  warning: null
};

function render() {
  const app = document.getElementById('app');
  if (state.step === 'input') app.innerHTML = renderInput();
  else if (state.step === 'detecting') app.innerHTML = renderDetecting();
  else if (state.step === 'confirm') app.innerHTML = renderConfirm();
  else if (state.step === 'analyzing') app.innerHTML = renderAnalyzing();
  else if (state.step === 'results') app.innerHTML = renderResults();
  app.querySelectorAll('.fade-up').forEach((el, i) => {
    el.style.animationDelay = (i * 0.06) + 's';
  });
}

function renderInput() {
  return `
  <div class="fade-up">
    <div class="hero-label">Analisi competitiva</div>
    <h1 class="hero-title">Scopri cosa fa<br>il tuo <span style="color:var(--accent)">competitor.</span></h1>
    <p class="hero-sub">Inserisci il dominio. Vedi le ads attive, i canali su cui investe, lo stack tecnologico e le keyword per cui sta pagando.</p>
    <div class="input-wrap">
      <input class="domain-input" id="domain-input" type="text" placeholder="competitor.it" value="${state.domain}" />
      <button class="btn-primary" onclick="startDetect()">Analizza →</button>
    </div>
    <div class="hint">
      <span onclick="setDomain('bottega-verde.it')">bottega-verde.it</span>
      <span onclick="setDomain('yoox.com')">yoox.com</span>
      <span onclick="setDomain('zalando.it')">zalando.it</span>
    </div>
    ${state.error ? `<div class="error-note" style="margin-top:16px;">${state.error}</div>` : ''}
  </div>`;
}

function setDomain(d) {
  state.domain = d;
  render();
  setTimeout(() => document.getElementById('domain-input')?.focus(), 50);
}

async function startDetect() {
  const input = document.getElementById('domain-input');
  const domain = input?.value.trim() || state.domain;
  if (!domain) return;
  state.domain = domain.replace(/^https?:\/\//, '').replace(/\/.*$/, '').toLowerCase();
  state.step = 'detecting';
  state.error = null;
  render();
  await runDetect();
}

function renderDetecting() {
  return `
  <div class="fade-up">
    <div class="loading-domain-label">${state.domain}</div>
    <div class="loading-steps">
      <div class="l-step"><div class="l-dot" id="ld-1"></div><div class="l-label" id="ll-1">Apertura homepage e rilevamento brand</div><div class="l-status" id="ls-1"></div></div>
      <div class="l-step"><div class="l-dot" id="ld-2"></div><div class="l-label" id="ll-2">Ricerca profili social collegati</div><div class="l-status" id="ls-2"></div></div>
      <div class="l-step"><div class="l-dot" id="ld-3"></div><div class="l-label" id="ll-3">Preparazione dati per conferma</div><div class="l-status" id="ls-3"></div></div>
    </div>
  </div>`;
}

async function runDetect() {
  await delay(200);
  setStep(1, 'active');
  try {
    const res = await fetch(`${API_BASE}/detect?domain=${encodeURIComponent(state.domain)}`);
    const data = await res.json();
    setStep(1, 'done', 'trovato');
    await delay(300);
    setStep(2, 'active');
    state.brandName = data.brandName || state.domain;
    state.profiles = (data.socials || []).map(p => ({ ...p, included: true }));
    await delay(500);
    setStep(2, 'done', `${state.profiles.length} profili`);
    setStep(3, 'active');
    await delay(400);
    setStep(3, 'done', 'pronto');
    await delay(300);
    state.step = 'confirm';
    if (data.warning) state.warning = data.warning;
    render();
  } catch (err) {
    state.step = 'input';
    state.error = 'Impossibile raggiungere il sito. Verifica il dominio e riprova.';
    render();
  }
}

function setStep(n, status, text) {
  const dot = document.getElementById(`ld-${n}`);
  const label = document.getElementById(`ll-${n}`);
  const st = document.getElementById(`ls-${n}`);
  if (!dot) return;
  dot.className = `l-dot ${status}`;
  label.className = `l-label ${status}`;
  if (text && st) { st.className = 'l-status done'; st.textContent = text; }
}

function renderConfirm() {
  const profilesHTML = state.profiles.map(p => `
    <div class="profile-card ${p.included ? 'confirmed' : 'excluded'}" id="pcard-${p.id}">
      <div class="profile-icon">${p.id === 'fb' ? '📘' : p.id === 'ig' ? '📷' : '💼'}</div>
      <div class="profile-info">
        <div class="profile-platform">
          ${p.platform}
          <span class="confidence-badge ${p.confidence === 'high' ? 'conf-high' : 'conf-low'}">
            ${p.confidence === 'high' ? 'rilevato' : 'stimato'}
          </span>
        </div>
        ${p.id === 'fb' ? `
        <div style="margin-top:6px;">
          <input
            type="text"
            id="fb-slug-input"
            value="${p.slug || p.handle}"
            oninput="updateFbSlug(this.value)"
            style="width:100%; height:38px; border-radius:6px; background:var(--surface2); border:1px solid var(--border); padding:0 14px; font-size:13px; font-family:'Space Mono',monospace; color:var(--text); outline:none; letter-spacing:.02em;"
            placeholder="nome.pagina"
          />
          <div style="font-size:11px; color:var(--muted); margin-top:6px; font-family:'Space Mono',monospace;">facebook.com/<span id="fb-slug-preview">${p.slug || p.handle}</span></div>
        </div>` : `
        <div class="profile-name">${p.handle}</div>
        <div class="profile-url">${p.url}</div>`}
      </div>
      <div class="profile-actions">
        <button class="btn-toggle ${p.included ? 'active-confirm' : ''}" onclick="toggleProfile('${p.id}', true)">Includi</button>
        <button class="btn-toggle ${!p.included ? 'active-exclude' : ''}" onclick="toggleProfile('${p.id}', false)">Escludi</button>
      </div>
    </div>`).join('');

  return `
  <div class="fade-up">
    <button class="back-btn" onclick="goBack()">← Cambia dominio</button>
    <div class="confirm-title">Conferma i profili</div>
    <div class="confirm-sub">Rilevati per <strong style="color:var(--text)">${state.brandName}</strong> — correggi se necessario prima di avviare l'analisi.</div>
    ${state.warning ? `<div class="warning-note">${state.warning}</div>` : ''}
    ${profilesHTML}
    <div class="confirm-note"><strong>Importante:</strong> i dati delle ads Meta provengono dalla pagina Facebook confermata. Se il competitor usa una pagina diversa, modificala ora per risultati accurati.</div>
    <button class="btn-launch" onclick="startAnalysis()">Conferma e avvia analisi →</button>
  </div>`;
}

function toggleProfile(id, include) {
  state.profiles = state.profiles.map(p => p.id === id ? { ...p, included: include } : p);
  render();
}

function updateFbSlug(value) {
  const clean = value.trim().replace(/^https?:\/\/(www\.)?facebook\.com\//, '').replace(/\/$/, '');
  state.profiles = state.profiles.map(p =>
    p.id === 'fb' ? { ...p, slug: clean, handle: clean, url: `https://facebook.com/${clean}` } : p
  );
  const preview = document.getElementById('fb-slug-preview');
  if (preview) preview.textContent = clean;
}

function goBack() {
  state.step = 'input';
  state.error = null;
  state.warning = null;
  render();
}

function renderAnalyzing() {
  return `
  <div class="fade-up">
    <div class="loading-domain-label">${state.domain}</div>
    <div class="loading-steps">
      <div class="l-step"><div class="l-dot" id="ld-1"></div><div class="l-label" id="ll-1">Meta Ad Library — ads attive</div><div class="l-status" id="ls-1"></div></div>
      <div class="l-step"><div class="l-dot" id="ld-2"></div><div class="l-label" id="ll-2">SEMrush — traffico e keyword paid</div><div class="l-status" id="ls-2"></div></div>
      <div class="l-step"><div class="l-dot" id="ld-3"></div><div class="l-label" id="ll-3">Tech stack — tool e pixel rilevati</div><div class="l-status" id="ls-3"></div></div>
      <div class="l-step"><div class="l-dot" id="ld-4"></div><div class="l-label" id="ll-4">Composizione report</div><div class="l-status" id="ls-4"></div></div>
    </div>
  </div>`;
}

async function startAnalysis() {
  state.step = 'analyzing';
  render();

  const fbProfile = state.profiles.find(p => p.id === 'fb' && p.included);
  const fbSlug = fbProfile?.slug || fbProfile?.handle?.replace('@', '') || '';

  setStep(1, 'active');
  setStep(2, 'active');
  setStep(3, 'active');

  const [adsRes, semRes, techRes] = await Promise.allSettled([
    fetch(`${API_BASE}/adlibrary?pageName=${encodeURIComponent(fbSlug)}&brandName=${encodeURIComponent(state.brandName)}&limit=20`).then(r => r.json()),
    fetch(`${API_BASE}/semrush?domain=${encodeURIComponent(state.domain)}`).then(r => r.json()),
    fetch(`${API_BASE}/techstack?domain=${encodeURIComponent(state.domain)}`).then(r => r.json())
  ]);

  setStep(1, 'done', adsRes.status === 'fulfilled' ? `${adsRes.value.total || 0} ads` : 'errore');
  setStep(2, 'done', semRes.status === 'fulfilled' ? 'ok' : 'errore');
  setStep(3, 'done', techRes.status === 'fulfilled' ? `${techRes.value.summary?.totalCount || 0} tool` : 'errore');
  setStep(4, 'active');
  await delay(400);
  setStep(4, 'done', 'completato');
  await delay(300);

  state.results = {
    ads: adsRes.status === 'fulfilled' ? adsRes.value : { ads: [], total: 0, error: 'API non disponibile' },
    semrush: semRes.status === 'fulfilled' ? semRes.value : null,
    tech: techRes.status === 'fulfilled' ? techRes.value : null
  };

  state.step = 'results';
  render();
}

function renderResults() {
  const { ads, semrush, tech } = state.results;
  const totalAds = ads.total || 0;
  const traffic = semrush?.traffic?.formatted || '—';
  const kwPaid = semrush?.keywords?.paid ?? '—';
  const authority = semrush?.authority?.score ?? '—';

  return `
  <div class="fade-up">
    <button class="back-btn" onclick="resetTool()">← Nuova analisi</button>
    <div style="display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:28px;">
      <div>
        <div class="results-label">${state.domain}</div>
        <div class="results-title">Report — ${state.brandName}</div>
      </div>
      <div class="live-badge"><div class="live-dot"></div>Dati live</div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Ads attive</div>
        <div class="stat-value red">${totalAds > 0 ? totalAds : '<span class="stat-null">—</span>'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Traffico / mese</div>
        <div class="stat-value">${traffic}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Keyword paid</div>
        <div class="stat-value">${kwPaid}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Authority score</div>
        <div class="stat-value">${authority !== '—' ? authority : '<span class="stat-null">—</span>'}</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-ads" onclick="switchTab('ads')">Ads attive</button>
      <button class="tab-btn" id="tab-canali" onclick="switchTab('canali')">Canali</button>
      <button class="tab-btn" id="tab-tech" onclick="switchTab('tech')">Tech stack</button>
    </div>

    <div class="panel active" id="panel-ads">${renderAdsPanel(ads)}</div>
    <div class="panel" id="panel-canali">${renderCanaliPanel(semrush)}</div>
    <div class="panel" id="panel-tech">${renderTechPanel(tech)}</div>
  </div>`;
}

function renderAdsPanel(ads) {
  if (ads.error && !ads.ads?.length) {
    return `<div class="error-note">${ads.error}</div>
    <div class="warning-note">Per attivare: aggiungi META_ACCESS_TOKEN nelle variabili d'ambiente di Vercel.</div>`;
  }
  if (!ads.ads?.length) {
    return `<div class="empty-state">Nessuna ads attiva trovata.<br>Verifica che la pagina Facebook confermata sia corretta.</div>`;
  }

  const visibleAds = ads.ads.slice(0, 4);
  const hiddenCount = Math.max(0, (ads.total || ads.ads.length) - 4);

  const adsHTML = visibleAds.map(ad => `
    <div class="ad-card">
  <div class="ad-creative" style="height:120px; background:linear-gradient(135deg, #1a1a1a 0%, #111 100%); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px;">
  <div style="font-size:10px; font-family:'Space Mono',monospace; color:var(--muted); letter-spacing:.12em; text-transform:uppercase;">${(ad.platforms || ['Meta']).map(p => p.replace('audience_network','Audience').toUpperCase()).join(' · ')}</div>
  <div style="font-size:9px; color:#333; letter-spacing:.08em; font-family:'Space Mono',monospace;">META ADS</div>
</div>
      <div class="ad-body">
        <div class="ad-platform">${(ad.platforms || ['Meta']).join(' · ')}</div>
        <div class="ad-headline">${escapeHtml(ad.headline)}</div>
        ${ad.copy ? `<div class="ad-copy">${escapeHtml(ad.copy)}</div>` : ''}
        <div class="ad-footer">
          <span class="ad-live">● Attiva</span>
          <span class="ad-days">${ad.daysActive != null ? `da ${ad.daysActive}gg` : ''}</span>
          ${ad.snapshotUrl ? `<a class="ad-link" href="${ad.snapshotUrl}" target="_blank">Vedi →</a>` : ''}
        </div>
      </div>
    </div>`).join('');

  return `
    <div class="ads-grid">${adsHTML}</div>
    ${hiddenCount > 0 ? `
    <div class="gate-wrap">
      <div class="gate-blur">
        ${Array(4).fill(`<div class="ad-card"><div class="ad-creative"></div><div class="ad-body"><div class="ad-headline">Annuncio nascosto</div><div class="ad-copy">Sblocca il report completo...</div></div></div>`).join('')}
      </div>
      <div class="gate-overlay">
        <div class="gate-title">+${hiddenCount} ads nascoste</div>
        <div class="gate-sub">Inserisci la tua email per ricevere il report completo</div>
        <div class="gate-row">
          <input class="gate-email" id="gate-email" type="email" placeholder="tua@email.it" />
          <button class="gate-submit" onclick="submitGate()">Invia →</button>
        </div>
        <div class="gate-success" id="gate-success" style="display:none">Report inviato! Controlla la tua email.</div>
      </div>
    </div>` : ''}`;
}

function renderCanaliPanel(semrush) {
  if (!semrush) return `<div class="warning-note">SEMrush API non disponibile. Aggiungi SEMRUSH_API_KEY nelle variabili d'ambiente.</div>`;

  const channels = semrush.channels || [];
  const keywords = semrush.topAdKeywords || [];

  const chHTML = channels.length ? channels.map(ch => `
    <div class="ch-row">
      <div class="ch-name">${ch.nome}</div>
      <div class="ch-bar-bg"><div class="ch-bar" style="width:${ch.pct}%; background:${ch.colore};"></div></div>
      <div class="ch-pct">${ch.pct}%</div>
    </div>`).join('') : '<div class="empty-state">Dati canali non disponibili.</div>';

  const kwHTML = keywords.length ? `
    <div class="kw-section">
      <div class="kw-title">Top keyword paid</div>
      ${keywords.map(kw => `
        <div class="kw-row">
          <div class="kw-word">${escapeHtml(kw.keyword)}</div>
          <div class="kw-vol">${kw.volume ? kw.volume.toLocaleString() + '/mo' : ''}</div>
          <div class="kw-cpc">${kw.cpc ? '€' + kw.cpc : ''}</div>
        </div>`).join('')}
    </div>` : '';

  return `
    <div class="channels-card">
      <div class="ch-section-title">Distribuzione traffico stimata</div>
      ${chHTML}
    </div>
    ${kwHTML}
    ${semrush.traffic?.organic ? `<div class="ch-note">Traffico organico stimato: <strong style="color:var(--text)">${semrush.traffic.formatted}</strong> visite/mese — keyword organiche indicizzate: <strong style="color:var(--text)">${semrush.keywords?.organic?.toLocaleString() || '—'}</strong>.</div>` : ''}`;
}

function renderTechPanel(tech) {
  if (!tech || !tech.summary) return `<div class="warning-note">Impossibile analizzare il sito.</div>`;

  const s = tech.summary;
  const total = s.totalCount || 0;

  if (total === 0) return `<div class="empty-state">Nessun tool rilevato. Il sito potrebbe bloccare l'analisi.</div>`;

  const categories = [
    { key: 'platform', label: 'Piattaforma', cls: 'platform' },
    { key: 'marketing', label: 'Marketing automation', cls: 'marketing' },
    { key: 'ads', label: 'Advertising & pixel', cls: 'ads' },
    { key: 'analytics', label: 'Analytics & CRO', cls: 'analytics' },
    { key: 'crm', label: 'CRM', cls: 'analytics' },
    { key: 'chat', label: 'Chat & support', cls: 'marketing' },
    { key: 'other', label: 'Altro', cls: '' }
  ];

  const sectionsHTML = categories
    .filter(c => s[c.key]?.length)
    .map(c => `
      <div class="tech-section">
        <div class="tech-section-label">${c.label}</div>
        <div class="tech-tags">
          ${s[c.key].map(t => `<span class="tech-tag ${c.cls}">${escapeHtml(t)}</span>`).join('')}
        </div>
      </div>`).join('');

  return `<div class="tech-card">${sectionsHTML}</div>
    <div class="ch-note" style="margin-top:16px;">Rilevati <strong style="color:var(--text)">${total} tool</strong> sul sito.${s.marketing?.length ? ` Marketing automation: <strong style="color:var(--text)">${s.marketing.join(', ')}</strong>.` : ''}${s.platform?.length ? ` Piattaforma: <strong style="color:var(--text)">${s.platform.join(', ')}</strong>.` : ''}</div>`;
}

function switchTab(id) {
  ['ads', 'canali', 'tech'].forEach(t => {
    document.getElementById(`panel-${t}`)?.classList.toggle('active', t === id);
    document.getElementById(`tab-${t}`)?.classList.toggle('active', t === id);
  });
}

function submitGate() {
  const email = document.getElementById('gate-email')?.value.trim();
  if (!email || !email.includes('@')) return;
  document.getElementById('gate-success').style.display = 'block';
  document.getElementById('gate-email').disabled = true;
  document.querySelector('.gate-submit').disabled = true;
  console.log('Lead acquisito:', { email, domain: state.domain, brand: state.brandName });
}

function resetTool() {
  state = { step: 'input', domain: '', brandName: '', profiles: [], results: null, error: null, warning: null };
  render();
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && state.step === 'input') startDetect();
});

render();
</script>
</body>
</html>
